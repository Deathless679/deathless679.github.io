        { blockId: "tech", blockName: "МДК.02.01. Технология изготовления лекарственных форм", text: "ПРИ ДОЗИРОВАНИИ ПО ОБЪЕМУ ПО НИЖНЕМУ МЕНИСКУ ОТМЕРИВАЮТ ЖИДКОСТИ", options: ["А) неокрашенные", "Б) окрашенные", "В) вязкие", "Г) летучие"], correct: 0 },

        { blockId: "control", blockName: "МДК.02.02. Контроль качества лекарственных средств", text: "ОТКЛОНЕНИЯ, ДОПУСТИМЫЕ ПРИ ИЗГОТОВЛЕНИИ ЛЕКАРСТВЕННЫХ СРЕДСТВ, РЕГЛАМЕНТИРУЕТ НД", options: ["А) ОФС.1.8.0001", "Б) МЗ РФ № 309 от 21.10.1997 г", "В) МЗ РФ № 1175н от 20.12.2012 г.", "Г) МЗ РФ N 646н от 31.08.2016 г."], correct: 0 },

        { blockId: "control", blockName: "МДК.02.02. Контроль качества лекарственных средств", text: "СОГЛАСНО ПРИКАЗУ МЗ РФ ОТ 22.05.2023 Г. №249Н РЕЗУЛЬТАТЫ ХИМИЧЕСКОГО КОНТРОЛЯ ВОДЫ ОЧИЩЕННОЙ ЗАНОСЯТ В", options: ["А) журнал регистрации результатов контроля воды очищенной и воды для инъекций", "Б) журнал регистрации результатов контроля лекарственных средств на подлинность", "В) лабораторный журнал", "Г) журнал регистрации режима стерилизации"], correct: 0 },
        { blockId: "control", blockName: "МДК.02.02. Контроль качества лекарственных средств", text: "ЕСЛИ ПРОВИЗОРОМ-АНАЛИТИКОМ ПРОВЕДЕН ПОЛНЫЙ ХИМИЧЕСКИЙ КОНТРОЛЬ ... ТО ПРОСТАВЛЯЕТСЯ НОМЕР АНАЛИЗА И ПОДПИСЬ НА", options: ["А) ППК", "Б) рецепте", "В) этикетке", "Г) копии рецепта"], correct: 0 },
        { blockId: "control", blockName: "МДК.02.02. Контроль качества лекарственных средств", text: "В ЖУРНАЛЕ РЕГИСТРАЦИИ РЕЗУЛЬТАТОВ КОНТРОЛЯ ВОДЫ ОЧИЩЕННОЙ ОТРАЖАЮТ", options: ["А) дату получения и контроля, № анализа, результаты контроля на отсутствие примесей", "Б) дату получения, результаты контроля на отсутствия примесей, № серии", "В) дату контроля, № рецепта", "Г) дату получения, № требования МО"], correct: 0 },

        // добавим еще пару для объема
        { blockId: "tech", blockName: "МДК.02.01. Технология изготовления лекарственных форм", text: "ПРИ ИЗГОТОВЛЕНИИ ПОРОШКОВ УЧИТЫВАЮТ, ЧТО К ТРУДНОИЗМЕЛЬЧАЕМЫМ ВЕЩЕСТВАМ ОТНОСЯТСЯ", options: ["А) кислота борная", "Б) рибофлабин", "В) фенобарбитал", "Г) ксероформ"], correct: 0 },
        { blockId: "tech", blockName: "МДК.02.01. Технология изготовления лекарственных форм", text: "ТРИТУРАЦИЮ ИСПОЛЬЗУЮТ, ЕСЛИ МАССА ЯДОВИТОГО ИЛИ СИЛЬНОДЕЙСТВУЮЩЕГО ВЕЩЕСТВА НА ВСЕ ДОЗЫ", options: ["А) менее 0,05", "Б) менее 0,1", "В) менее 0,5", "Г) менее 0,08"], correct: 0 }

    // Дополнительно добавим несколько недостающих, чтобы второй блок выглядел полнее (из заданий 100+)
    const extraControl = [

        { blockId: "control", blockName: "МДК.02.02. Контроль качества лекарственных средств", text: "ЛЕКАРСТВЕННОЕ СРЕДСТВО, ПРИ НЕПРАВИЛЬНОМ ХРАНЕНИИ КОТОРОГО ПРОИСХОДИТ ВЫВЕТРИВАНИЕ КРИСТАЛЛИЗАЦИОННОЙ ВОДЫ", options: ["А) цинка сульфат", "Б) натрия хлорид", "В) калия иодид", "Г) натрия гидрокарбонат"], correct: 0 },
        { blockId: "control", blockName: "МДК.02.02. Контроль качества лекарственных средств", text: "ВОДУ ОЧИЩЕННУЮ ХРАНЯТ В АПТЕКЕ НЕ БОЛЕЕ", options: ["А) 3 суток", "Б) 1 суток", "В) 7 суток", "Г) 2 суток"], correct: 0 }
    ];
    const fullQuestions = [...RAW_QUESTIONS, ...extraControl];

    // Функция перемешивания массива (random shuffle)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Для каждого вопроса перемешиваем варианты ответов, но сохраняем правильный индекс (новый)
    function shuffleOptions(question) {
        const opts = question.options;
        const correctOldIdx = question.correct;
        const correctText = opts[correctOldIdx];
        const optsWithIdx = opts.map((text, idx) => ({ text, idx }));
        const shuffled = shuffleArray([...optsWithIdx]);
        const newOptions = shuffled.map(item => item.text);
        const newCorrectIdx = shuffled.findIndex(item => item.text === correctText);
        return { ...question, options: newOptions, correct: newCorrectIdx };
    }

    // Генерация блоков с перемешанными вопросами и перемешанными вариантами
    function buildShuffledBlocks() {
        // Группировка по blockId
        const techQuestions = fullQuestions.filter(q => q.blockId === "tech");
        const controlQuestions = fullQuestions.filter(q => q.blockId === "control");
        // перемешиваем порядок вопросов внутри каждого блока
        const shuffledTech = shuffleArray([...techQuestions]);
        const shuffledControl = shuffleArray([...controlQuestions]);
        // для каждого вопроса перемешиваем варианты ответов
        const processedTech = shuffledTech.map(q => shuffleOptions(q));
        const processedControl = shuffledControl.map(q => shuffleOptions(q));
        return [
            { title: "МДК.02.01. «Технология изготовления лекарственных форм»", subtitle: "Вопросы по технологии изготовления ЛФ", questions: processedTech, blockKey: "tech" },
            { title: "МДК.02.02. «Контроль качества лекарственных средств»", subtitle: "Вопросы по контролю качества", questions: processedControl, blockKey: "control" }
        ];
    }

    let currentBlocks = buildShuffledBlocks();      // актуальная структура блоков с перемешанными вопросами/вариантами
    // Хранилище ответов: { "blockIdx_qIdx": { selectedOptionIndex: number, confirmed: bool, isCorrect: bool, userAnswerText? } }
    let answersState = {};

    // Загрузка из localStorage
    function loadFromStorage() {
        const stored = localStorage.getItem("tech_control_test_state");
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (parsed.answersState && parsed.blockVersions && parsed.blockVersions === JSON.stringify(currentBlocks.map(b => b.questions.map(q => q.text)))) {
                    answersState = parsed.answersState;
                } else {
                    // если структура изменилась (например пересборка) — не загружаем старые ответы
                    answersState = {};
                }
            } catch(e) { answersState = {}; }
        }
    }

    function saveToStorage() {
        const toStore = {
            answersState: answersState,
            blockVersions: JSON.stringify(currentBlocks.map(b => b.questions.map(q => q.text)))
        };
        localStorage.setItem("tech_control_test_state", JSON.stringify(toStore));
    }

    // подтверждение ответа
    function confirmAnswer(blockIdx, qIdx, selectedOptIdx) {
        const block = currentBlocks[blockIdx];
        const question = block.questions[qIdx];
        const isCorrect = (selectedOptIdx === question.correct);
        const key = `${blockIdx}_${qIdx}`;
        if (!answersState[key]) answersState[key] = {};
        answersState[key] = {
            selectedOption: selectedOptIdx,
            confirmed: true,
            isCorrect: isCorrect,
            correctAnswerIdx: question.correct
        };
        saveToStorage();
        renderBlocks(); // перерисовка для отображения результата сразу
    }

    // сброс теста (очищаем сторедж и пересобираем блоки заново с рандомным порядком)
    function resetTest() {
        // заново перемешиваем вопросы и варианты
        currentBlocks = buildShuffledBlocks();
        answersState = {};
        localStorage.removeItem("tech_control_test_state");
        renderBlocks();
    }

    // рендер всей страницы
    function renderBlocks() {
        const container = document.getElementById("blocksContainer");
        if (!container) return;
        container.innerHTML = "";
        for (let bIdx = 0; bIdx < currentBlocks.length; bIdx++) {
            const block = currentBlocks[bIdx];
            const blockDiv = document.createElement("div");
            blockDiv.className = "block";
            blockDiv.innerHTML = `
                <div class="block-title">${escapeHtml(block.title)}</div>
                <div class="block-sub">${escapeHtml(block.subtitle)}</div>
                <div id="block-${bIdx}-questions"></div>
            `;
            container.appendChild(blockDiv);
            const questionsContainer = blockDiv.querySelector(`#block-${bIdx}-questions`);
            const questions = block.questions;
            for (let qIdx = 0; qIdx < questions.length; qIdx++) {
                const q = questions[qIdx];
                const answerKey = `${bIdx}_${qIdx}`;
                const saved = answersState[answerKey] || null;
                const confirmed = saved && saved.confirmed;
                const selectedIdx = saved ? saved.selectedOption : undefined;
                const isCorrectSaved = saved ? saved.isCorrect : null;
                // строим карточку
                const card = document.createElement("div");
                card.className = "question-card";
                // опции
                let optionsHtml = "";
                q.options.forEach((opt, optIdx) => {
                    let checkedAttr = (selectedIdx === optIdx && confirmed) ? 'checked' : '';
                    let disabledAttr = confirmed ? 'disabled' : '';
                    let itemClass = "option-item";
                    if (confirmed && selectedIdx === optIdx) itemClass += " selected";
                    optionsHtml += `
                        <div class="${itemClass}" data-opt-index="${optIdx}">
                            <input type="radio" name="q_${bIdx}_${qIdx}" value="${optIdx}" id="opt_${bIdx}_${qIdx}_${optIdx}" class="option-radio" ${checkedAttr} ${disabledAttr}>
                            <label class="option-label" for="opt_${bIdx}_${qIdx}_${optIdx}">${escapeHtml(opt)}</label>
                        </div>
                    `;
                });
                let feedbackHtml = "";
                if (confirmed) {
                    const correctness = isCorrectSaved ? "✅ Верно!" : "❌ Неверно!";
                    const correctAnswerText = q.options[q.correct];
                    feedbackHtml = `<div class="feedback"><span class="${isCorrectSaved ? 'correct-msg' : 'wrong-msg'}">${correctness}</span> ${!isCorrectSaved ? `<span style="margin-left: 8px;">Правильный ответ: ${escapeHtml(correctAnswerText)}</span>` : ""}</div>`;
                }
                let confirmBtnHtml = "";
                if (!confirmed) {
                    confirmBtnHtml = `<button class="confirm-btn" data-block="${bIdx}" data-qidx="${qIdx}">✓ Подтвердить ответ</button>`;
                } else {
                    confirmBtnHtml = `<span class="result-status">${isCorrectSaved ? "✔ Отвечен верно" : "✘ Отвечен неверно"}</span>`;
                }
                card.innerHTML = `
                    <div class="question-text">${escapeHtml(q.text)}</div>
                    <div class="options-list" data-block="${bIdx}" data-qidx="${qIdx}">
                        ${optionsHtml}
                    </div>
                    <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 10px;">
                        ${confirmBtnHtml}
                    </div>
                    ${feedbackHtml}
                `;
                questionsContainer.appendChild(card);
                // Добавляем обработчики для радио (только если не подтверждено)
                if (!confirmed) {
                    const radioInputs = card.querySelectorAll(`input[type="radio"]`);
                    radioInputs.forEach(radio => {
                        radio.addEventListener("change", (e) => {
                            // снимаем выделение со всех option-item в этой карточке
                            const allOptDivs = card.querySelectorAll(".option-item");
                            allOptDivs.forEach(div => div.classList.remove("selected"));
                            const parentDiv = radio.closest(".option-item");
                            if (parentDiv) parentDiv.classList.add("selected");
                        });
                    });
                    const confirmButton = card.querySelector(".confirm-btn");
                    if (confirmButton) {
                        confirmButton.addEventListener("click", (e) => {
                            const selectedRadio = card.querySelector(`input[type="radio"]:checked`);
                            if (!selectedRadio) {
                                alert("Пожалуйста, выберите вариант ответа.");
                                return;
                            }
                            const selectedVal = parseInt(selectedRadio.value);
                            confirmAnswer(bIdx, qIdx, selectedVal);
                        });
                    }
                }
            }
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // инициализация
    function init() {
        loadFromStorage();
        renderBlocks();
        document.getElementById("resetAllBtn").addEventListener("click", () => resetTest());
    }
    init();
</script>
</body>
</html>
