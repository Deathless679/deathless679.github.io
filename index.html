            gap: 14px;

        // Функция перемешивания массива
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Генерация уникального ID вопроса (стабильный)
        function generateQuestionId(questionText, correctLetter) {
            let hash = 0;
            const str = questionText + correctLetter;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'q_' + Math.abs(hash).toString(36);
        }

        // КЛЮЧИ ДЛЯ localStorage
        const STORAGE_QUESTIONS_KEY = 'pharma_test_questions_stable_v1';
        const STORAGE_PROGRESS_KEY = 'pharma_test_progress_v4';
        
        let questions = [];
        let currentQuestionId = null;
        let userAnswers = {};
        let answerStatus = {};
        
        // Инициализация или загрузка вопросов
        function initQuestions() {
            const savedQuestions = localStorage.getItem(STORAGE_QUESTIONS_KEY);
            
            if (savedQuestions) {
                // Восстанавливаем сохранённый порядок вопросов
                questions = JSON.parse(savedQuestions);
            } else {
                // Создаём вопросы в первый раз
                const shuffledBlock1 = shuffleArray([...block1Raw]);
                const shuffledBlock2 = shuffleArray([...block2Raw]);
                const allRaw = [...shuffledBlock1, ...shuffledBlock2];
                
                questions = allRaw.map((q) => {
                    const originalOptions = [
                        { letter: 'А', text: q.a },
                        { letter: 'Б', text: q.b },
                        { letter: 'В', text: q.c },
                        { letter: 'Г', text: q.d }
                    ];
                    const shuffledOptions = shuffleArray([...originalOptions]);
                    const stableId = generateQuestionId(q.q, q.correct);
                    
                    return {
                        id: stableId,
                        questionText: q.q,
                        options: shuffledOptions,
                        correctLetter: q.correct,
                    };
                });
                
                // Сохраняем порядок вопросов
                localStorage.setItem(STORAGE_QUESTIONS_KEY, JSON.stringify(questions));
            }
        }
        
        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_PROGRESS_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    const currentIds = questions.map(q => q.id);
                    
                    // Проверяем, что сохранённые ответы относятся к текущим вопросам
                    if (data.userAnswers && data.answerStatus) {
                        const savedAnswerIds = Object.keys(data.userAnswers);
                        const allIdsValid = savedAnswerIds.every(id => currentIds.includes(id));
                        
                        if (allIdsValid) {
                            userAnswers = data.userAnswers;
                            answerStatus = data.answerStatus;
                        } else {
                            // Если структура вопросов изменилась - сбрасываем
                            resetProgress();
                        }
                    }
                    
                    // Восстанавливаем текущий вопрос
                    if (data.currentQuestionId && currentIds.includes(data.currentQuestionId)) {
                        currentQuestionId = data.currentQuestionId;
                    } else {
                        // Ищем первый неотвеченный вопрос или первый в списке
                        const firstUnanswered = questions.find(q => !userAnswers.hasOwnProperty(q.id));
                        currentQuestionId = firstUnanswered ? firstUnanswered.id : questions[0]?.id;
                    }
                } catch(e) {
                    resetProgress();
                }
            } else {
                resetProgress();
            }
            
            if (!currentQuestionId && questions.length) {
                currentQuestionId = questions[0].id;
            }
            
            updateStatsUI();
        }
        
        function resetProgress() {
            userAnswers = {};
            answerStatus = {};
            currentQuestionId = questions[0]?.id;
            saveProgress();
        }
        
        function saveProgress() {
            const data = {
                currentQuestionId: currentQuestionId,
                userAnswers: userAnswers,
                answerStatus: answerStatus
            };
            localStorage.setItem(STORAGE_PROGRESS_KEY, JSON.stringify(data));
            updateStatsUI();
        }
        
        // Полный сброс с перемешиванием вопросов
        function fullReset() {
            // Перемешиваем вопросы заново
            const shuffledBlock1 = shuffleArray([...block1Raw]);
            const shuffledBlock2 = shuffleArray([...block2Raw]);
            const allRaw = [...shuffledBlock1, ...shuffledBlock2];
            
            questions = allRaw.map((q) => {
                const originalOptions = [
                    { letter: 'А', text: q.a },
                    { letter: 'Б', text: q.b },
                    { letter: 'В', text: q.c },
                    { letter: 'Г', text: q.d }
                ];
                const shuffledOptions = shuffleArray([...originalOptions]);
                const stableId = generateQuestionId(q.q, q.correct);
                
                return {
                    id: stableId,
                    questionText: q.q,
                    options: shuffledOptions,
                    correctLetter: q.correct,
                };
            });
            
            // Сохраняем новый порядок вопросов
            localStorage.setItem(STORAGE_QUESTIONS_KEY, JSON.stringify(questions));
            
            // Сбрасываем прогресс
            resetProgress();
            
            // Обновляем общее количество
            document.getElementById('total-questions').textContent = questions.length;
            
            renderCurrentQuestion();
        }
        
        function computeStats() {
            const totalAnswered = Object.keys(userAnswers).length;
            let correct = 0;
            for (let id in answerStatus) {
                if (answerStatus[id] === true) correct++;
            }
            const errors = totalAnswered - correct;
            const percent = totalAnswered === 0 ? 0 : Math.round((correct / totalAnswered) * 100);
            return { totalAnswered, correct, errors, percent };
        }
        
        function updateStatsUI() {
            const stats = computeStats();
            document.getElementById('answered-count').textContent = stats.totalAnswered;
            document.getElementById('correct-count').textContent = stats.correct;
            document.getElementById('error-count').textContent = stats.errors;
            document.getElementById('percent-correct').textContent = stats.percent + '%';
            document.getElementById('total-questions').textContent = questions.length;
        }
        
        function getIndexById(id) {
            return questions.findIndex(q => q.id === id);
        }
        
        function renderCurrentQuestion() {
            const currentIndex = getIndexById(currentQuestionId);
            
            // Проверка на завершение теста
            if (currentIndex === -1 || currentIndex >= questions.length) {
                quizArea.innerHTML = '';
                const stats = computeStats();
                document.getElementById('finalStats').innerHTML = `
                    <p>✅ Отвечено: ${stats.totalAnswered} из ${questions.length}</p>
                    <p>✔️ Верных ответов: ${stats.correct}</p>
                    <p>❌ Ошибок: ${stats.errors}</p>
                    <p>📊 Процент верных: ${stats.percent}%</p>
                `;
                completionScreen.classList.remove('hidden');
                return;
            }
            completionScreen.classList.add('hidden');
            
            const q = questions[currentIndex];
            const selectedLetter = userAnswers[q.id] || null;
            const isAnswered = answerStatus.hasOwnProperty(q.id);
            const isCorrect = answerStatus[q.id];
            
            const blockName = currentIndex < 150 ? 'МДК.02.01 «Технология изготовления лекарственных форм»' : 'МДК.02.02 «Контроль качества лекарственных средств»';
            
            let html = `
                <div class="block-badge">📌 ${blockName}</div>
                <div class="question-card">
                    <div class="question-header">
                        <span>Вопрос ${currentIndex+1} из ${questions.length}</span>
                        ${isAnswered ? '<span>✅ Отвечено</span>' : '<span>⏳ Ожидает ответа</span>'}
                    </div>
                    <div class="question-text">${escapeHtml(q.questionText)}</div>
                    <div class="options">
            `;
            
            q.options.forEach(opt => {
                let optionClass = 'option';
                if (selectedLetter === opt.letter) optionClass += ' selected';
                if (isAnswered) {
                    optionClass += ' disabled-true';
                    if (opt.letter === q.correctLetter) {
                        optionClass += ' correct-highlight';
                    } else if (selectedLetter === opt.letter && opt.letter !== q.correctLetter) {
                        optionClass += ' wrong-highlight';
                    }
                }
                html += `
                    <div class="${optionClass}" data-letter="${opt.letter}">
                        <span class="option-letter">${opt.letter}</span>
                        <span>${escapeHtml(opt.text)}</span>
                    </div>
                `;
            });
            
            html += `</div><div class="actions">`;
            if (!isAnswered) {
                html += `<button class="btn btn-primary" id="submitAnswerBtn" ${!selectedLetter ? 'disabled' : ''}>Ответить</button>`;
            }
            html += `<button class="btn btn-outline" id="nextQuestionBtn">${isAnswered ? 'Далее ▶' : 'Пропустить'}</button>`;
            html += `</div>`;
            
            if (isAnswered) {
                const correctOptionText = q.options.find(o => o.letter === q.correctLetter).text;
                if (isCorrect) {
                    html += `<div class="feedback" style="border-left-color: #2e8b57;">✔ Правильно! Вы выбрали верный ответ.</div>`;
                } else {
                    const selectedText = q.options.find(o => o.letter === selectedLetter)?.text || '';
                    html += `<div class="feedback" style="border-left-color: #c23b3b;">❌ Неверно. Правильный ответ: ${q.correctLetter}) ${escapeHtml(correctOptionText)}</div>`;
                }
            }
            
            html += `</div><div class="nav-buttons">`;
            html += `<button class="btn btn-outline" id="prevQuestionBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Назад</button>`;
            html += `<button class="btn btn-outline" id="nextQuestionBtn2">${isAnswered ? 'Далее ▶' : 'Пропустить'}</button>`;
            html += `</div>`;
            
            quizArea.innerHTML = html;
            
            const optionDivs = document.querySelectorAll('.option');
            if (!isAnswered) {
                optionDivs.forEach(div => {
                    div.addEventListener('click', (e) => {
                        const letter = div.dataset.letter;
                        optionDivs.forEach(d => d.classList.remove('selected'));
                        div.classList.add('selected');
                        const submitBtn = document.getElementById('submitAnswerBtn');
                        if (submitBtn) submitBtn.disabled = false;
                        q._tempSelected = letter;
                    });
                });
            }
            
            const submitBtn = document.getElementById('submitAnswerBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', () => {
                    const selected = q._tempSelected;
                    if (!selected) return;
                    userAnswers[q.id] = selected;
                    const isCorrectAns = (selected === q.correctLetter);
                    answerStatus[q.id] = isCorrectAns;
                    saveProgress();
                    renderCurrentQuestion();
                });
            }
            
            function goNext() {
                const nextIndex = getIndexById(currentQuestionId) + 1;
                if (nextIndex < questions.length) {
                    currentQuestionId = questions[nextIndex].id;
                    saveProgress();
                    renderCurrentQuestion();
                } else {
                    // Тест завершён
                    currentQuestionId = null;
                    saveProgress();
                    renderCurrentQuestion();
                }
            }
            
            document.getElementById('nextQuestionBtn')?.addEventListener('click', goNext);
            document.getElementById('nextQuestionBtn2')?.addEventListener('click', goNext);
            
            const prevBtn = document.getElementById('prevQuestionBtn');
            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    const prevIndex = getIndexById(currentQuestionId) - 1;
                    if (prevIndex >= 0) {
                        currentQuestionId = questions[prevIndex].id;
                        saveProgress();
                        renderCurrentQuestion();
                    }
                });
            }
        }
        
        // Простая защита от XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        // Инициализация и запуск
        initQuestions();
        loadProgress();
        renderCurrentQuestion();
        
        // Кнопки сброса
        document.getElementById('resetTestBtn').addEventListener('click', () => {
            if (confirm('Начать тест заново? Весь прогресс будет сброшен, вопросы перемешаются.')) {
                fullReset();
            }
        });
        
        document.getElementById('resetFromCompleteBtn').addEventListener('click', () => {
            fullReset();
        });
    })();
</script>
</body>
</html>
